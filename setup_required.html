<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>セットアップが必要です</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; background: #FFFDF8; color: #333; margin: 0; padding: 24px; }
    .card {
      max-width: 560px; margin: 24px auto;
      background: #fff; border: 1px solid #eee; border-radius: 12px;
      padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,.05);
    }
    h1 { font-size: 20px; margin: 0 0 12px; color: #FF6B35; }
    ol { line-height: 1.9; padding-left: 20px; }
    code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .note { color: #666; font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1><?= appName ?> のセットアップが必要です</h1>
    <p>WebApp を使う前に、スプレッドシート側で初回セットアップを実行してください。</p>
    <ol>
      <li>このスクリプトに紐付いたスプレッドシートを開く</li>
      <li>メニューバーの <code>おたよりBOX</code> → <code>🚀 初回セットアップ実行</code> をクリック</li>
      <li>完了トーストが出たらこのページを再読込</li>
    </ol>
    <p class="note">※ メニューが出ない場合はスプレッドシートを一度閉じて開き直してください。</p>
  </div>
</body>
</html>
