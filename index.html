<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title><?= appName ?></title>

  <!-- Google Fonts（CLAUDE.md §7） -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- PDF.js（PDFサムネを canvas に1ページ目レンダリング） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // worker のCDN URLを設定（GAS WebAppのiframe内でworkerが動かない時に備えたフォールバック）
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>

  <!-- 共通CSS（T-06 css.html）。未実装時はコメントのみで静かにスキップ -->
  <?!= include('css', true); ?>
</head>
<body>
  <header class="app-header">
    <span><?= appName ?></span>
    <span class="app-header-bell" aria-hidden="true"><i data-lucide="bell"></i></span>
  </header>

  <main id="app">
    <!-- 全ページコンポーネントを同梱（SPA）。ファイル無ければプレースホルダ -->
    <section data-page="home"     class="page"><?!= include('home');     ?></section>
    <section data-page="list"     class="page"><?!= include('notices');  ?></section>
    <section data-page="upload"   class="page"><?!= include('upload');   ?></section>
    <section data-page="children" class="page"><?!= include('children'); ?></section>
    <section data-page="settings" class="page"><?!= include('settings'); ?></section>
  </main>

  <nav class="bottom-nav" aria-label="メインナビゲーション">
    <button type="button" data-nav-page="home"><i data-lucide="home"></i>ホーム</button>
    <button type="button" data-nav-page="list"><i data-lucide="list"></i>一覧</button>
    <button type="button" data-nav-page="upload" class="bottom-nav-center" aria-label="登録"><i data-lucide="camera"></i></button>
    <button type="button" data-nav-page="children"><i data-lucide="users"></i>子ども</button>
    <button type="button" data-nav-page="settings"><i data-lucide="settings"></i>設定</button>
  </nav>

  <!-- PC幅（1024px+）でCSSにより表示されるサイドナビゲーション -->
  <nav class="side-nav" aria-label="サイドナビゲーション">
    <button type="button" data-nav-page="home"><i data-lucide="home"></i>ホーム</button>
    <button type="button" data-nav-page="list"><i data-lucide="list"></i>一覧</button>
    <button type="button" data-nav-page="upload"><i data-lucide="camera"></i>登録</button>
    <button type="button" data-nav-page="children"><i data-lucide="users"></i>子ども</button>
    <button type="button" data-nav-page="settings"><i data-lucide="settings"></i>設定</button>
  </nav>

  <!-- サーバーから渡される初期表示ページ名 -->
  <script>
    window.INITIAL_PAGE = '<?= initialPage ?>';
    window.APP_VERSION  = '<?= appVersion ?>';
  </script>

  <!-- 共通JS（T-18）：showPage / showToast / callGAS / モーダル制御等を集約 -->
  <!-- 初期ページ表示・ナビ結線・Lucide描画も js.html の init() で実施する -->
  <?!= include('js', true); ?>
</body>
</html>
